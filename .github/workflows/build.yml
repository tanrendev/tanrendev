name: refresh profile

on:
  schedule:
    - cron: "0 6 * * *"
  push:
    branches: [master]
    paths: [music.json, projects.json, main.py, builder/**, templates/**]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0 # zizmor: ignore[artipacked]
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - run: uv run python main.py fetch
        continue-on-error: true
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      - run: uv run python main.py render
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md music.json assets
          git diff --cached --quiet && exit 0
          git commit -m "chore: refresh now spinning"
          git push
