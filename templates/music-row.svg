<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 830 56" width="830" height="56" role="img" aria-labelledby="t d">
  <title id="t">$title by $artist</title>
  <desc id="d">Ranked $rank among the most played tracks of the last four weeks.</desc>
  <rect x="0.5" y="0.5" width="829" height="55" rx="10" fill="$panel" stroke="$line"/>
  <text x="24" y="35" font-family="'IBM Plex Mono', ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace" font-size="11" fill="$faint">$rank</text>
  <text x="64" y="35" font-family="'IBM Plex Sans', -apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="600" fill="$text">$title<tspan font-weight="400" fill="$muted"> · $artist</tspan></text>
  $chips
</svg>
