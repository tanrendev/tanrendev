<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 830 200" width="830" height="200" role="img" aria-labelledby="t d">
  <title id="t">Now spinning: $title by $artist</title>
  <desc id="d">Turntable card: the most played track of the last four weeks.</desc>
  <style>@media (prefers-reduced-motion: reduce) { .sheen { display: none; } }</style>
  <rect x="0.5" y="0.5" width="829" height="199" rx="12" fill="$panel" stroke="$line"/>
  <circle cx="105" cy="100" r="66" fill="$vinyl_a"/>
  <circle cx="105" cy="100" r="36" fill="none" stroke="$vinyl_b" stroke-width="2"/><circle cx="105" cy="100" r="42.5" fill="none" stroke="$vinyl_b" stroke-width="2"/><circle cx="105" cy="100" r="49" fill="none" stroke="$vinyl_b" stroke-width="2"/><circle cx="105" cy="100" r="55.5" fill="none" stroke="$vinyl_b" stroke-width="2"/><circle cx="105" cy="100" r="62" fill="none" stroke="$vinyl_b" stroke-width="2"/>
  <g class="sheen" opacity="$sheen_opacity">
    <path d="M105,100 L87.92,36.25 A66,66 0 0 1 122.08,36.25 Z" fill="#FFFFFF">
      <animateTransform attributeName="transform" type="rotate" from="0 105 100" to="360 105 100" dur="9s" repeatCount="indefinite"/>
    </path>
  </g>
  <circle cx="105" cy="100" r="27" fill="$hot"/>
  <circle cx="105" cy="100" r="3.5" fill="$panel"/>
  <text x="210" y="64" font-family="'IBM Plex Mono', ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace" font-size="11" letter-spacing="2.4" fill="$lead">NOW SPINNING</text>
  <text x="210" y="106" font-family="Bitter, Georgia, 'Times New Roman', serif" font-size="30" font-weight="800" fill="$text">$title</text>
  <text x="210" y="134" font-family="'IBM Plex Sans', -apple-system, 'Segoe UI', sans-serif" font-size="15" fill="$muted">$artist</text>
  $chips
</svg>
